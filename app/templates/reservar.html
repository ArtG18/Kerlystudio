{% extends "base.html" %}
{% block content %}

<style>
.container {
    max-width: 520px;
    margin: auto;
    padding: 20px;
}

/* STEPS */
.step {
    display: none;
    animation: fade 0.4s ease;
}

.step.active {
    display: block;
}

@keyframes fade {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

/* CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

/* TITLES */
h3 {
    margin-bottom: 15px;
}

/* GRID */
.grid {
    display: grid;
    gap: 10px;
}

/* SERVICE */
.service {
    padding: 12px;
    border: 1px solid #eee;
    border-radius: 12px;
    cursor: pointer;
}

.service.active {
    background: #ff4d94;
    color: white;
}

/* MANICURISTA */
.mani {
    padding: 12px;
    border: 1px solid #eee;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
}

.mani.active {
    background: #ff4d94;
    color: white;
}

/* HORAS */
.hora {
    padding: 10px;
    border: 1px solid #eee;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
}

.hora.active {
    background: #ff4d94;
    color: white;
}

/* BUTTON */
.btn-main {
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    background: linear-gradient(45deg,#ff4d94,#ff0066);
    color: white;
    border: none;
    cursor: pointer;
}

/* RESUMEN */
.resumen {
    background: #fff0f6;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
}
</style>

<div class="container">

<form method="POST" id="form">

<!-- STEP 1 -->
<div class="step active" id="step1">
<div class="card">
<h3>Selecciona servicio</h3>

<div class="grid">
{% for s in servicios %}
<div class="service" data-id="{{ s.id }}" data-nombre="{{ s.nombre }}" data-precio="{{ s.precio }}">
{{ s.nombre }} - ${{ s.precio }}
</div>
{% endfor %}
</div>

<input type="hidden" name="servicio_id" id="servicio">
</div>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<div class="card">
<h3>Profesional</h3>

<div class="grid">
<div class="mani" data-id="1">Adri</div>
<div class="mani" data-id="2">Kerly</div>
<div class="mani" data-id="3">Josi</div>
<div class="mani" data-id="4">Leonela</div>
</div>

<input type="hidden" name="manicurista_id" id="manicurista">
</div>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
<div class="card">
<h3>Fecha</h3>
<input type="date" name="fecha" id="fecha" required>
</div>
</div>

<!-- STEP 4 -->
<div class="step" id="step4">
<div class="card">
<h3>Hora</h3>

<div class="grid" id="horas"></div>

<input type="hidden" name="hora_inicio" id="hora">
</div>
</div>

<!-- STEP 5 -->
<div class="step" id="step5">

<div class="resumen" id="resumen"></div>

<div class="card">
<input type="text" name="nombre" placeholder="Nombre" required>
<input type="text" name="telefono" placeholder="Teléfono" required>
<input type="email" name="email" placeholder="Correo" required>
</div>

<button class="btn-main">Confirmar reserva</button>

</div>

</form>

</div>

<script>
let currentStep = 1;
const next = () => {
    document.getElementById("step"+currentStep).classList.remove("active");
    currentStep++;
    document.getElementById("step"+currentStep).classList.add("active");
    window.scrollTo({top:0, behavior:'smooth'});
};

/* SERVICIO */
document.querySelectorAll(".service").forEach(el=>{
    el.onclick=()=>{
        document.querySelectorAll(".service").forEach(e=>e.classList.remove("active"));
        el.classList.add("active");

        document.getElementById("servicio").value = el.dataset.id;
        window.servicioNombre = el.dataset.nombre;
        window.servicioPrecio = el.dataset.precio;

        next();
    };
});

/* MANICURISTA */
document.querySelectorAll(".mani").forEach(el=>{
    el.onclick=()=>{
        document.querySelectorAll(".mani").forEach(e=>e.classList.remove("active"));
        el.classList.add("active");

        document.getElementById("manicurista").value = el.dataset.id;
        window.maniNombre = el.innerText;

        next();
    };
});

/* FECHA */
document.getElementById("fecha").addEventListener("change", ()=>{
    next();
    renderHoras();
});

/* HORAS */
const horas = ["09:00","10:00","11:00","12:00","14:00","15:00","16:00","17:00"];

function renderHoras(){
    let cont = document.getElementById("horas");
    cont.innerHTML="";

    horas.forEach(h=>{
        let div=document.createElement("div");
        div.className="hora";
        div.innerText=h;

        div.onclick=()=>{
            document.querySelectorAll(".hora").forEach(e=>e.classList.remove("active"));
            div.classList.add("active");

            document.getElementById("hora").value=h;

            buildResumen();
            next();
        };

        cont.appendChild(div);
    });
}

/* RESUMEN */
function buildResumen(){
    document.getElementById("resumen").innerHTML = `
        <strong>Servicio:</strong> ${window.servicioNombre}<br>
        <strong>Profesional:</strong> ${window.maniNombre}<br>
        <strong>Fecha:</strong> ${document.getElementById("fecha").value}<br>
        <strong>Hora:</strong> ${document.getElementById("hora").value}<br>
        <strong>Total:</strong> $${window.servicioPrecio}
    `;
}
</script>

{% endblock %}

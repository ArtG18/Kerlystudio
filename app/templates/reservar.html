{% extends "base.html" %}
{% block content %}

<style>
.reservar-header {
    text-align: center;
    margin-bottom: 20px;
}

.reservar-header h2 {
    font-weight: 700;
}

.form-card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.form-control, .form-select {
    border-radius: 12px;
    padding: 12px;
    border: 1px solid #eee;
    margin-bottom: 12px;
}

.horas-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.hora-btn {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #eee;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
}

.hora-btn:hover {
    background: #fff0f6;
}

.hora-btn.selected {
    background: #ff4d94;
    color: white;
}

.hora-btn.disabled {
    background: #eee;
    color: #999;
    cursor: not-allowed;
}

.btn-main {
    width: 100%;
    margin-top: 15px;
}

.loading {
    display: none;
    text-align: center;
    margin-top: 10px;
    font-size: 0.9rem;
    color: #777;
}
</style>

<div class="reservar-header">
    <h2>Completa tu reserva ✨</h2>
    <p class="text-muted">Solo un paso más 💅</p>
</div>

<div class="form-card">

<form method="POST" id="formReserva">

<input type="text" name="nombre" placeholder="Nombre" class="form-control" required>
<input type="text" name="telefono" placeholder="Teléfono" class="form-control" required>
<input type="email" name="email" placeholder="Correo" class="form-control" required>

<h6>Profesional</h6>
<select name="manicurista_id" class="form-select" required>
{% for m in manicuristas %}
<option value="{{ m.id }}">{{ m.nombre }}</option>
{% endfor %}
</select>

<h6>Fecha</h6>
<input type="date" name="fecha" id="fecha" class="form-control" required>

<h6>Hora</h6>
<input type="hidden" name="hora_inicio" id="hora_inicio">
<div class="horas-grid" id="horasContainer"></div>

<button type="submit" class="btn btn-main" id="btnReservar">
Confirmar reserva
</button>

<div class="loading" id="loadingText">
Enviando solicitud...
</div>

</form>

</div>

<!-- MODAL -->
<div id="modalExito" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
">

<div style="
background:white;
padding:25px;
border-radius:20px;
text-align:center;
max-width:300px;
">

<h4>✨ Solicitud enviada</h4>
<p>Tu cita fue enviada.<br>La manicurista debe confirmarla.</p>

<button onclick="cerrarModal()" class="btn btn-main">
Aceptar
</button>

</div>
</div>

<script>
const horas = [
"09:00","09:30","10:00","10:30",
"11:00","11:30","12:00","12:30",
"14:00","14:30","15:00","15:30",
"16:00","16:30","17:00","17:30"
];

const container = document.getElementById("horasContainer");
const inputHora = document.getElementById("hora_inicio");

// 🔥 BLOQUEAR FECHAS PASADAS
const hoy = new Date().toISOString().split("T")[0];
document.getElementById("fecha").setAttribute("min", hoy);

// 🔥 RENDER HORAS PRO
function renderHoras(ocupadas=[]) {

    container.innerHTML = "";

    const fechaSeleccionada = document.getElementById("fecha").value;
    const ahora = new Date();

    horas.forEach(h => {

        let horaDate = new Date(`${fechaSeleccionada}T${h}`);

        // ❌ ocultar horas pasadas hoy
        if (fechaSeleccionada === hoy && horaDate < ahora) {
            return;
        }

        let div = document.createElement("div");
        div.className = "hora-btn";
        div.innerText = h;

        if (ocupadas.includes(h)) {
            div.classList.add("disabled");
        } else {
            div.onclick = () => {
                document.querySelectorAll(".hora-btn").forEach(b => b.classList.remove("selected"));
                div.classList.add("selected");
                inputHora.value = h;
            };
        }

        container.appendChild(div);
    });
}

// 🔥 FETCH HORAS
async function cargarHoras() {

    let fecha = document.getElementById("fecha").value;
    let manicurista = document.querySelector("[name='manicurista_id']").value;

    if (!fecha || !manicurista) return;

    try {
        let res = await fetch(`/horas-disponibles?fecha=${fecha}&manicurista_id=${manicurista}`);
        let data = await res.json();

        renderHoras(data.ocupadas);
    } catch {
        renderHoras();
    }
}

// EVENTOS
document.getElementById("fecha").addEventListener("change", cargarHoras);
document.querySelector("[name='manicurista_id']").addEventListener("change", cargarHoras);

// INICIAL
renderHoras();

// 🔥 VALIDACIÓN + MODAL
document.getElementById("formReserva").addEventListener("submit", function(e) {

    if (!inputHora.value) {
        e.preventDefault();
        alert("Selecciona una hora");
        return;
    }

    document.getElementById("btnReservar").innerText = "Enviando...";
    document.getElementById("loadingText").style.display = "block";

    setTimeout(() => {
        document.getElementById("modalExito").style.display = "flex";
    }, 800);
});

function cerrarModal() {
    window.location.href = "/";
}
</script>

{% endblock %}

{% extends "base.html" %}
{% block content %}

<div class="hero container">
    <div>
        <h1>Manos que hablan por ti</h1>
        <p>Diseño, precisión y estilo en cada detalle</p>

        <a href="/catalogo" class="btn">Ver servicios</a>
    </div>
</div>

<div class="container">

<h2 style="margin-bottom:20px;">Servicios</h2>

<div class="grid" style="grid-template-columns: repeat(auto-fit,minmax(250px,1fr));">

{% for s in servicios %}
<div class="service-card">

    <img src="{{ url_for('static', filename='servicios/' ~ (s.imagen if s.imagen else 'default.jpg')) }}">

    <div class="service-content">
        <div class="service-name">{{ s.nombre }}</div>
        <div class="price">${{ s.precio }}</div>
    </div>

</div>
{% endfor %}

</div>

</div>

{% endblock %}

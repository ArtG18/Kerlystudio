<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kerly Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
font-family:'Poppins',sans-serif;
margin:0;
}

/* HERO */
.hero {
height:90vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
background:url("/static/portada.jpeg") center/cover fixed;
position:relative;
}
.hero::before {
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}
.hero-content {
position:relative;
z-index:2;
}

/* BOTONES */
.btn-main {
background:linear-gradient(135deg,#ff4d94,#e60073);
color:white;
padding:14px 30px;
border-radius:30px;
text-decoration:none;
display:inline-block;
margin-top:10px;
cursor:pointer;
}

/* STICKY */
.sticky-btn {
position:fixed;
bottom:80px;
right:20px;
background:#ff4d94;
color:white;
padding:14px 20px;
border-radius:30px;
z-index:999;
}

/* WHATSAPP */
.whatsapp {
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:26px;
}

/* SECCIONES */
.section {
padding:80px 20px;
text-align:center;
}

.gallery img {
width:100%;
max-width:250px;
margin:10px;
border-radius:15px;
cursor:pointer;
}
</style>
</head>

<body>

{% block content %}{% endblock %}

<!-- BOTÓN FIJO -->
<a href="{{ url_for('reservas.reservar') }}" class="sticky-btn">
Reservar 💅
</a>

<!-- WHATSAPP CLIENTE -->
<a onclick="enviarWhatsApp()" class="whatsapp">
💬
</a>

<script>
/* CLIENTE */
function enviarWhatsApp(servicio="", fecha="", hora="") {

let numero = "{{ get_config('whatsapp_numero') }}";

let mensaje = "Hola! 😊 Quiero agendar una cita:\n\n";

if(servicio){
mensaje += "💅 Servicio: " + servicio + "\n";
}

if(fecha){
mensaje += "📅 Fecha: " + fecha + "\n";
}

if(hora){
mensaje += "⏰ Hora: " + hora + "\n";
}

if(!servicio && !fecha && !hora){
mensaje += "💬 Me gustaría ver disponibilidad y reservar";
}

let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);

window.open(url, "_blank");
}

/* CONFIRMAR CITA */
function confirmarCita(nombre, servicio, fecha, hora) {

let numero = "{{ get_config('whatsapp_numero') }}";

let mensaje = "Hola " + nombre + " 😊\n\n";
mensaje += "✨ Tu cita ha sido CONFIRMADA:\n\n";
mensaje += "💅 Servicio: " + servicio + "\n";
mensaje += "📅 Fecha: " + fecha + "\n";
mensaje += "⏰ Hora: " + hora + "\n\n";
mensaje += "Te esperamos 💖";

let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);

window.open(url, "_blank");
}

/* RECORDATORIO */
function recordatorio(nombre, fecha, hora){

let numero = "{{ get_config('whatsapp_numero') }}";

let mensaje = "Hola " + nombre + " 😊\n\n";
mensaje += "⏰ Te recordamos tu cita:\n\n";
mensaje += "📅 Fecha: " + fecha + "\n";
mensaje += "⏰ Hora: " + hora + "\n\n";
mensaje += "¡Te esperamos! 💅";

let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);

window.open(url, "_blank");
}
</script>

</body>
</html>

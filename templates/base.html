<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kerly Studio</title>

  <meta name="theme-color" content="#ff4d94">

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ICONOS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #fdf7fa;
      margin: 0;
      padding: 0;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 📱 CONTENEDOR APP */
    .main-container {
      max-width: 480px;
      margin: 0 auto;
      padding: 12px 10px 30px;
    }

    /* NAVBAR */
    .navbar-kerly {
      background: white;
      border-bottom: 1px solid #f3e3ea;
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    .navbar-brand {
      font-weight: 700;
      color: #c2185b !important;
    }

    .nav-link {
      color: #555 !important;
      font-weight: 500;
      transition: 0.2s;
    }

    .nav-link:hover {
      color: #ff4d94 !important;
    }

    /* BOTONES */
    .btn-main {
      background: linear-gradient(135deg, #ff4d94, #e60073);
      color: white;
      border-radius: 30px;
      font-weight: 600;
      border: none;
      padding: 10px 20px;
      transition: 0.25s;
      box-shadow: 0 5px 15px rgba(255,77,148,0.3);
    }

    .btn-main:hover {
      transform: translateY(-2px);
      color: white;
      box-shadow: 0 8px 20px rgba(255,77,148,0.4);
    }

    .btn:active {
      transform: scale(0.95);
    }

    /* TARJETAS */
    .card {
      border: none;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
      transition: 0.25s;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    /* INPUTS */
    input, select {
      border-radius: 12px !important;
      border: 1px solid #eee !important;
      padding: 10px !important;
    }

    input:focus, select:focus {
      border-color: #ff4d94 !important;
      box-shadow: 0 0 0 2px rgba(255,77,148,0.2) !important;
    }

    /* WHATSAPP FLOAT */
    .whatsapp-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, #25D366, #1ebe5d);
      color: white;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      z-index: 9999;
      transition: 0.3s;
    }

    .whatsapp-float:hover {
      transform: scale(1.1);
      color: white;
    }

    /* LOADER GLOBAL */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 99999;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #eee;
      border-top: 4px solid #ff4d94;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-kerly px-3">
  <div class="container-fluid">

    <a class="navbar-brand" href="{{ url_for('home') }}">
      Kerly Studio
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('catalogo') }}">Servicios</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('reservar') }}">Reservar</a>
        </li>

        {% if logged_user %}
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('mis_citas') }}">Mis citas</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('logout') }}">Salir</a>
          </li>
        {% else %}
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('login') }}">Entrar</a>
          </li>
        {% endif %}

      </ul>
    </div>
  </div>
</nav>

<!-- CONTENIDO -->
<div class="main-container">
  {% block content %}{% endblock %}
</div>

<!-- 🔥 WHATSAPP (LISTO PARA HACER DINÁMICO DESPUÉS) -->
<a href="https://wa.me/56959257968" class="whatsapp-float" target="_blank">
  <i class="fa-brands fa-whatsapp"></i>
</a>

<!-- LOADER -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function showLoader() {
    document.getElementById("loading").style.display = "flex";
}
</script>

</body>
</html>

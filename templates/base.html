<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kerly Studio</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/main.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #fdf7fa;
      margin: 0;
      padding: 0;
    }

    .main-container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .btn-pink {
      background: #ff4d94;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 10px 18px;
      font-weight: 500;
    }

    .btn-pink:hover {
      background: #e60073;
      color: white;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .form-control,
    .form-select,
    .btn {
      min-height: 48px;
      font-size: 1rem;
    }

    h1, h2, h3, h4, h5 {
      word-break: break-word;
    }

    .table-responsive {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    @media (max-width: 768px) {
      .main-container {
        padding: 12px;
      }

      .card {
        border-radius: 16px;
      }

      h1 {
        font-size: 1.8rem;
      }

      h2 {
        font-size: 1.5rem;
      }

      h3 {
        font-size: 1.3rem;
      }

      .btn-pink {
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .main-container {
        padding: 10px;
      }

      h1 {
        font-size: 1.5rem;
      }

      h2 {
        font-size: 1.25rem;
      }

      h3 {
        font-size: 1.1rem;
      }

      .card {
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="main-container">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
</body>
</html>

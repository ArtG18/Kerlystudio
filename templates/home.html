<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerly Nails Studio | Concepción</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4A373; --black: #1A1A1A; --white: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; line-height: 1.6; }
        
        /* LOGO CIRCULAR */
        nav { position: fixed; top: 0; width: 100%; padding: 10px 8%; display: flex; justify-content: space-between; align-items: center; background: white; z-index: 1000; border-bottom: 1px solid #eee; }
        .logo-img { height: 60px; width: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 50px 8%; }
        .card { padding: 20px; border: 1px solid #eee; text-align: center; }
        .card img { width: 100%; height: 300px; object-fit: cover; border-radius: 5px; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 400px; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
        .btn-reserva { background: var(--black); color: white; border: none; padding: 12px; cursor: pointer; width: 100%; font-weight: 600; }
    </style>
</head>
<body>

<nav>
    <img src="https://i.ibb.co/ZRFJmhvY/Logo.jpg" class="logo-img" alt="Logo">
    <div class="nav-links"><a href="#servicios">Servicios</a></div>
</nav>

<section id="servicios" style="margin-top: 100px;">
    <div class="grid">
        {% for s in servicios %}
        <div class="card">
            <img src="{{ s.imagen_url }}" alt="{{ s.nombre }}">
            <h3 style="margin-top:15px;">{{ s.nombre }}</h3>
            <p style="font-size:0.8rem; color:var(--gold);">🕒 {{ s.duracion_min }} min</p>
            <p style="font-weight:600; margin:10px 0;">${{ s.precio }}</p>
            <button class="btn-reserva" onclick="openModal('{{ s.id }}', '{{ s.nombre }}')">Agendar</button>
        </div>
        {% endfor %}
    </div>
</section>

<div id="modalReserva" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle"></h2>
        <form action="/reservar_sin_login" method="POST" id="formReserva">
            <input type="hidden" name="servicio_id" id="serviceId">
            <input type="text" name="nombre_cliente" placeholder="Tu Nombre" required>
            <input type="tel" name="telefono" placeholder="WhatsApp" required>
            <input type="date" name="fecha" id="datePicker" onchange="updateHours()" required>
            <select name="hora" id="hourSelect" required>
                <option value="">Selecciona una fecha</option>
            </select>
            <button type="submit" class="btn-reserva">Confirmar Cita</button>
            <p onclick="closeModal()" style="margin-top:15px; cursor:pointer; font-size:0.8rem;">Cerrar</p>
        </form>
    </div>
</div>

<script>
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('datePicker').setAttribute('min', today);

    function openModal(id, name) {
        document.getElementById('serviceId').value = id;
        document.getElementById('modalTitle').innerText = name;
        document.getElementById('modalReserva').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalReserva').style.display = 'none'; }

    async function updateHours() {
        const dateInput = document.getElementById('datePicker').value;
        const select = document.getElementById('hourSelect');
        const day = new Date(dateInput + "T00:00:00").getDay();
        
        select.innerHTML = '<option>Cargando...</option>';
        const resp = await fetch(`/get_horas_ocupadas/${dateInput}`);
        const ocupadas = await resp.json();

        let horas = (day === 6) ? ["09:30", "11:00", "12:30"] : ["09:30", "11:00", "12:30", "14:00", "15:30", "17:00"];
        if (day === 0) { alert("Cerrado los domingos"); return; }

        select.innerHTML = '';
        horas.forEach(h => {
            let opt = document.createElement('option');
            opt.value = h;
            if (ocupadas.includes(h)) {
                opt.text = h + " (Ocupado)";
                opt.disabled = true;
            } else {
                opt.text = h + " hrs";
            }
            select.appendChild(opt);
        });
    }

    document.getElementById('formReserva').onsubmit = () => alert("¡Cita solicitada! Te redirigiremos a WhatsApp.");
</script>
</body>
</html>

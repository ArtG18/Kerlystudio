<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerly Nails Studio | Concepción</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --beige: #F5F5F0; 
            --gold: #D4A373; 
            --white: #FFFFFF; 
            --black: #1A1A1A; 
            --whatsapp: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--white); 
            color: var(--black);
            line-height: 1.6;
        }

        /* BARRA DE NAVEGACIÓN */
        nav { 
            position: fixed; top: 0; width: 100%; padding: 10px 8%; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); 
            z-index: 1000; border-bottom: 1px solid #eee; 
        }

        .logo-img { 
            height: 60px; width: 60px; object-fit: cover; border-radius: 50%; 
            border: 2px solid var(--gold); padding: 2px; background: white;
        }

        .nav-links { display: flex; align-items: center; gap: 30px; }
        .nav-links a { 
            text-decoration: none; color: var(--black); font-size: 0.75rem; 
            font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
        }

        /* BOTÓN WHATSAPP FLOTANTE */
        .btn-whatsapp {
            position: fixed; bottom: 30px; right: 30px;
            background-color: var(--whatsapp); color: white;
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 3000; transition: 0.3s; text-decoration: none;
        }
        .btn-whatsapp:hover { transform: scale(1.1); background-color: #128C7E; }

        /* PORTADA */
        header { 
            height: 85vh; 
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://i.ibb.co/pvGc8rbc/portada.jpg') center/cover; 
            display: flex; align-items: center; justify-content: center; text-align: center; color: white; margin-top: 60px;
        }

        /* SERVICIOS */
        .section { padding: 100px 10%; text-align: center; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin-bottom: 50px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .card { background: white; padding: 30px; border: 1px solid #f2f2f2; transition: 0.4s; border-radius: 8px; }
        .card:hover { box-shadow: 0 15px 40px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 350px; object-fit: cover; margin-bottom: 25px; border-radius: 5px; }

        .btn-reserva { 
            background: var(--black); color: white; padding: 14px 30px; 
            border: none; cursor: pointer; font-weight: 600; 
            text-transform: uppercase; transition: 0.4s; width: 100%; border-radius: 5px;
        }
        .btn-reserva:hover { background: var(--gold); }

        /* UBICACIÓN */
        #ubicacion { background: var(--beige); }
        .map-container { 
            width: 100%; max-width: 900px; margin: 0 auto; 
            border: 5px solid white; border-radius: 10px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* MODAL */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); display: none; justify-content: center; 
            align-items: center; z-index: 2000; 
        }
        .modal-content { background: white; padding: 40px; width: 95%; max-width: 420px; border-radius: 12px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-family: 'Montserrat'; }

        footer { padding: 60px 20px; text-align: center; border-top: 1px solid #eee; }
        .footer-logo { height: 50px; width: 50px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--gold); margin-bottom: 20px; }
    </style>
</head>
<body>

<a href="https://wa.me/56959257968" class="btn-whatsapp" target="_blank">
    <i class="fa-brands fa-whatsapp"></i>
</a>

<nav>
    <a href="/"><img src="https://i.ibb.co/ZRFJmhvY/Logo.jpg" class="logo-img" alt="Kerly Nails"></a>
    <div class="nav-links">
        <a href="#servicios">Servicios</a>
        <a href="#ubicacion"><i class="fa-solid fa-location-dot" style="color:var(--gold)"></i></a>
        <a href="/login"><i class="fa-solid fa-user-lock"></i></a>
    </div>
</nav>

<header>
    <div>
        <p style="letter-spacing:10px; margin-bottom: 20px; font-size: 0.75rem; font-weight: 600;">CONCEPCIÓN, CHILE</p>
        <h1 style="font-family:'Playfair Display'; font-size:4rem;">Kerly Nails Studio</h1>
    </div>
</header>

<section class="section" id="servicios">
    <h2 class="section-title">Nuestros Servicios</h2>
    <div class="grid">
        {% for s in servicios %}
        <div class="card">
            <img src="{{ url_for('static', filename='img/' + s.imagen) }}" alt="{{ s.nombre }}">
            <h3>{{ s.nombre }}</h3>
            <p style="font-size: 0.8rem; color: var(--gold); font-weight: 600; margin-bottom: 10px;">🕒 {{ s.duracion_min }} min</p>
            <p style="font-size: 0.85rem; color: #777; margin-bottom: 15px;">{{ s.descripcion }}</p>
            <span style="font-weight:700; display:block; margin-bottom:20px; font-size:1.2rem;">${{ s.precio }}</span>
            <button class="btn-reserva" onclick="openModal('{{ s.id }}', '{{ s.nombre }}')">Agendar Cita</button>
        </div>
        {% endfor %}
    </div>
</section>

<section class="section" id="ubicacion">
    <h2 class="section-title">Ubicación</h2>
    <p style="margin-bottom: 30px;"><i class="fa-solid fa-map-pin"></i> Concepción Centro, Chile</p>
    <div class="map-container">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3192.564619472346!2d-73.0513!3d-36.827!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9669b5d23f5d5d5d%3A0x0!2zMzbCsDQ5JzM3LjIiUyA3M8KwMDMnMDQuNyJX!5e0!3m2!1ses!2scl!4v123456789" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </div>
</section>

<div id="modalReserva" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="font-family:'Playfair Display'; margin-bottom:20px;"></h2>
        <form action="/reservar_sin_login" method="POST" id="formReserva">
            <input type="hidden" name="servicio_id" id="serviceId">
            <input type="text" name="nombre_cliente" placeholder="Nombre completo" required>
            <input type="tel" name="telefono" placeholder="WhatsApp (ej: +569...)" required>
            <input type="date" name="fecha" id="datePicker" onchange="updateHours()" required>
            <select name="hora" id="hourSelect" required>
                <option value="">Selecciona una fecha</option>
            </select>
            <button type="submit" class="btn-reserva" style="margin-top:10px;">Confirmar Cita</button>
            <p onclick="closeModal()" style="margin-top:15px; cursor:pointer; font-size:0.75rem; color:#999; text-transform:uppercase;">Cerrar</p>
        </form>
    </div>
</div>

<footer>
    <img src="https://i.ibb.co/ZRFJmhvY/Logo.jpg" class="footer-logo" alt="Logo">
    <p style="font-size:0.7rem; color:#999; letter-spacing:2px;">KERLY NAILS STUDIO © 2026</p>
</footer>

<script>
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('datePicker').setAttribute('min', today);

    function openModal(id, name) { 
        document.getElementById('serviceId').value = id; 
        document.getElementById('modalTitle').innerText = name; 
        document.getElementById('modalReserva').style.display='flex'; 
    }

    function closeModal() { document.getElementById('modalReserva').style.display='none'; }

    async function updateHours() {
        const dateInput = document.getElementById('datePicker').value;
        const select = document.getElementById('hourSelect');
        const day = new Date(dateInput + "T00:00:00").getDay();
        
        select.innerHTML = '<option>Cargando disponibilidad...</option>';
        const resp = await fetch(`/get_horas_ocupadas/${dateInput}`);
        const ocupadas = await resp.json();

        let baseHours = (day === 6) ? ["09:30", "11:00", "12:30"] : ["09:30", "11:00", "12:30", "14:00", "15:30", "17:00"];
        if (day === 0) { alert("Cerrado los domingos"); return; }

        select.innerHTML = '';
        baseHours.forEach(h => {
            let opt = document.createElement('option');
            opt.value = h;
            if (ocupadas.includes(h)) {
                opt.text = h + " (Ocupado)";
                opt.disabled = true;
            } else {
                opt.text = h + " hrs";
            }
            select.appendChild(opt);
        });
    }

    document.getElementById('formReserva').onsubmit = () => alert("¡Cita solicitada! Redirigiendo a WhatsApp para confirmación final.");
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Admin | Kerly Nails Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --gold: #D4A373; 
            --black: #1A1A1A; 
            --white: #FFFFFF; 
            --beige: #F5F5F0; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--beige); /* Fondo beige como el footer */
            color: var(--black);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* Logo Grande Fuera de la Tarjeta */
        .main-logo { 
            height: 80px; 
            margin-bottom: 40px; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        /* Tarjeta de Login Limpia */
        .login-card {
            background: var(--white);
            width: 100%;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #eee;
        }

        /* Título Principal */
        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 2rem; 
            color: var(--gold); /* El Dorado como color principal */
            margin-bottom: 10px;
            font-weight: 700;
        }

        /* Subtítulo */
        .subtitle {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 35px;
        }

        /* Estilo de Formulario */
        .form-group { text-align: left; margin-bottom: 25px; }
        
        .form-label { 
            font-size: 0.75rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            color: #555;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: #FAFAFA;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            box-sizing: border-box;
            transition: 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(212, 163, 115, 0.15);
        }

        /* El Botón de Oro */
        .btn-admin {
            background: var(--black);
            color: var(--white);
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.4s ease;
            margin-top: 10px;
        }

        .btn-admin:hover {
            background: var(--gold);
            color: var(--black);
            transform: translateY(-2px);
        }

        /* Mensajes de Error */
        .error-msg {
            background: #fdf2f2;
            color: #9b1c1c;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 25px;
            border: 1px solid #f8b4b4;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .back-home {
            display: block;
            margin-top: 30px;
            font-size: 0.85rem;
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .back-home:hover { color: var(--black); }

    </style>
</head>
<body>

<div class="login-container">
    <img src="https://i.ibb.co/ZRFJmhvY/Logo.jpg" alt="Kerly Nails Studio" class="main-logo">
    
    <div class="login-card">
        <h1>Admin</h1>
        <p class="subtitle">GESTIÓN INTERNA</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for m in messages %}
                <div class="error-msg">
                    <i class="fa-solid fa-circle-xmark"></i>
                    {{ m }}
                </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control" placeholder="Ej: kerly_admin" required>
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-admin">Entrar al Panel</button>
        </form>
        
        <a href="/" class="back-home">← Volver a la página principal</a>
    </div>
</div>

</body>
</html>

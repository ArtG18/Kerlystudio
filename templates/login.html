{% extends "base.html" %}
{% block content %}

<style>
    .login-wrapper {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #F5F5F0; /* Fondo beige claro como el footer */
        padding: 20px;
    }

    .login-card {
        width: 100%;
        max-width: 400px;
        background: white;
        border-radius: 20px;
        padding: 50px 40px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        text-align: center;
        border: 1px solid #eee;
    }

    .login-logo {
        height: 60px;
        margin-bottom: 25px;
    }

    .login-title {
        font-family: 'Playfair Display', serif;
        font-size: 2rem;
        color: #1A1A1A;
        margin-bottom: 10px;
    }

    .login-subtitle {
        color: #888;
        font-size: 0.9rem;
        margin-bottom: 35px;
        letter-spacing: 1px;
    }

    .form-group {
        text-align: left;
        margin-bottom: 20px;
    }

    .form-label {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #555;
        margin-bottom: 8px;
        display: block;
    }

    .form-control {
        width: 100%;
        padding: 14px;
        border: 1px solid #e0e0e0;
        border-radius: 10px;
        background: #fafafa;
        font-family: 'Montserrat', sans-serif;
        box-sizing: border-box;
    }

    .form-control:focus {
        outline: none;
        border-color: #D4A373;
        background: white;
    }

    .btn-admin {
        background: #1A1A1A;
        color: white;
        border: none;
        width: 100%;
        padding: 16px;
        border-radius: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: 0.4s;
        margin-top: 10px;
    }

    .btn-admin:hover {
        background: #D4A373; /* Cambio a dorado al pasar el mouse */
        transform: translateY(-2px);
    }

    .error-msg {
        background: #fdf2f2;
        color: #9b1c1c;
        padding: 10px;
        border-radius: 8px;
        font-size: 0.8rem;
        margin-bottom: 20px;
        border: 1px solid #f8b4b4;
    }

    .back-link {
        display: block;
        margin-top: 25px;
        font-size: 0.8rem;
        color: #D4A373;
        text-decoration: none;
        font-weight: 600;
    }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <img src="https://i.ibb.co/ZRFJmhvY/Logo.jpg" class="login-logo" alt="Kerly Nails">
        
        <h2 class="login-title">Admin</h2>
        <p class="login-subtitle">GESTIÓN INTERNA</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for m in messages %}
                    <div class="error-msg">{{ m }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control" placeholder="Ej: admin" required>
            </div>

            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-admin">Entrar al Panel</button>
        </form>

        <a href="/" class="back-link">← Volver al inicio</a>
    </div>
</div>

{% endblock %}

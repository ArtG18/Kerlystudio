<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Admin | Kerly Nails Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4A373; --black: #1A1A1A; --beige: #F5F5F0; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--beige); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .login-card {
            background: white; width: 100%; max-width: 380px; padding: 50px 40px; 
            border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center;
        }

        /* LOGO CIRCULAR LOGIN */
        .logo-admin { 
            height: 90px; width: 90px; border-radius: 50%; object-fit: cover; 
            border: 3px solid var(--gold); margin-bottom: 30px; padding: 3px; background: white;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--black); margin-bottom: 5px; }
        .subtitle { font-size: 0.75rem; letter-spacing: 2px; color: #888; margin-bottom: 35px; text-transform: uppercase; }

        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #eee; border-radius: 10px; background: #FAFAFA; box-sizing: border-box; }
        
        .btn-admin { 
            background: var(--black); color: white; border: none; width: 100%; padding: 16px; 
            border-radius: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .btn-admin:hover { background: var(--gold); transform: translateY(-2px); }
        
        .back { display: block; margin-top: 25px; font-size: 0.8rem; color: var(--gold); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://i.ibb.co/ZRFJmhvY/Logo.jpg" class="logo-admin" alt="Logo">
    <h1>Admin</h1>
    <p class="subtitle">Gestión del Studio</p>
    
    <form action="/login" method="POST">
        <input type="email" name="username" placeholder="Correo electrónico" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <button type="submit" class="btn-admin">Entrar al Panel</button>
    </form>
    
    <a href="/" class="back">← Volver al inicio</a>
</div>

</body>
</html>

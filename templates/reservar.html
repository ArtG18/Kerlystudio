{% extends "base.html" %}
{% block content %}

<style>
.reservar-header {
    text-align: center;
    margin-bottom: 20px;
}

.reservar-header h2 {
    font-weight: 700;
}

.form-card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

/* INPUTS */
.form-control, .form-select {
    border-radius: 12px;
    padding: 12px;
    border: 1px solid #eee;
    margin-bottom: 12px;
}

/* HORAS */
.horas-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.hora-btn {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #eee;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
}

.hora-btn:hover {
    background: #fff0f6;
}

.hora-btn.selected {
    background: #ff4d94;
    color: white;
    border: none;
}

.hora-btn.disabled {
    background: #eee;
    color: #999;
    cursor: not-allowed;
}

/* BOTÓN */
.btn-main {
    width: 100%;
    margin-top: 15px;
}

/* LOADING */
.loading {
    display: none;
    text-align: center;
    margin-top: 10px;
    font-size: 0.9rem;
    color: #777;
}
</style>

<div class="reservar-header">
    <h2>Completa tu reserva ✨</h2>
    <p class="text-muted">Solo un paso más 💅</p>
</div>

<div class="form-card">

<form method="POST" onsubmit="activarLoader()">

<input type="text" name="nombre" placeholder="Nombre" class="form-control" required>
<input type="text" name="telefono" placeholder="Teléfono" class="form-control" required>
<input type="email" name="email" placeholder="Correo" class="form-control" required>

<h6>Profesional</h6>
<select name="manicurista_id" class="form-select" required>
{% for m in manicuristas %}
<option value="{{ m.id }}">{{ m.nombre }}</option>
{% endfor %}
</select>

<h6>Fecha</h6>
<input type="date" name="fecha" id="fecha" class="form-control" required>

<h6>Hora</h6>

<input type="hidden" name="hora_inicio" id="hora_inicio">

<div class="horas-grid" id="horasContainer"></div>

<button type="submit" class="btn btn-main" id="btnReservar">
Confirmar reserva
</button>

<div class="loading" id="loadingText">
Reservando tu cita...
</div>

</form>

</div>

<script>
const horas = [
"09:00","09:30","10:00","10:30",
"11:00","11:30","12:00","12:30",
"14:00","14:30","15:00","15:30",
"16:00","16:30","17:00","17:30"
];

const container = document.getElementById("horasContainer");
const inputHora = document.getElementById("hora_inicio");

function renderHoras(ocupadas=[]) {
    container.innerHTML = "";

    horas.forEach(h => {
        let div = document.createElement("div");
        div.className = "hora-btn";
        div.innerText = h;

        if (ocupadas.includes(h)) {
            div.classList.add("disabled");
        } else {
            div.onclick = () => {
                document.querySelectorAll(".hora-btn").forEach(b => b.classList.remove("selected"));
                div.classList.add("selected");
                inputHora.value = h;
            };
        }

        container.appendChild(div);
    });
}

// 🔥 CARGAR HORAS DINÁMICAS
async function cargarHoras() {

    let fecha = document.getElementById("fecha").value;
    let manicurista = document.querySelector("[name='manicurista_id']").value;

    if (!fecha || !manicurista) return;

    try {
        let res = await fetch(`/horas-disponibles?fecha=${fecha}&manicurista_id=${manicurista}`);
        let data = await res.json();

        renderHoras(data.ocupadas);
    } catch (e) {
        renderHoras();
    }
}

// EVENTOS
document.getElementById("fecha").addEventListener("change", cargarHoras);
document.querySelector("[name='manicurista_id']").addEventListener("change", cargarHoras);

// inicial
renderHoras();

// LOADING
function activarLoader() {
    document.getElementById("btnReservar").innerText = "Reservando...";
    document.getElementById("loadingText").style.display = "block";
}
</script>

{% endblock %}

{% extends "base.html" %}
{% block content %}

<style>
.booking-header {
    text-align: center;
    margin-bottom: 25px;
}

.booking-title {
    font-weight: 700;
}

.booking-subtitle {
    color: #777;
    font-size: 0.95rem;
}

/* CARD */
.booking-card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

/* INPUTS */
input, select {
    width: 100%;
    margin-bottom: 12px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #eee;
}

/* SERVICIOS */
.servicio-item {
    background: #fff5f9;
    padding: 10px;
    border-radius: 12px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* BOTÓN */
.btn-reservar {
    background: linear-gradient(135deg, #ff4d94, #e60073);
    color: white;
    border: none;
    border-radius: 30px;
    padding: 14px;
    width: 100%;
    font-weight: 600;
    margin-top: 10px;
}

.btn-reservar:active {
    transform: scale(0.96);
}

/* LOADING */
.loading {
    display: none;
    text-align: center;
    margin-top: 10px;
}
</style>

<div class="booking-header">
    <h1 class="booking-title">Reserva tu cita</h1>
    <p class="booking-subtitle">
        Elige servicios, profesional y horario en segundos ✨
    </p>
</div>

<div class="booking-card">

<form method="POST" id="bookingForm" onsubmit="activarLoader()">

<!-- DATOS -->
<input type="text" name="nombre" placeholder="Tu nombre"
value="{{ request.form.get('nombre','') }}">

<input type="text" name="telefono" placeholder="Teléfono"
value="{{ request.form.get('telefono','') }}">

<input type="email" name="email" placeholder="Correo"
value="{{ request.form.get('email','') }}">

<!-- SERVICIOS -->
<h6>Servicios</h6>

{% for servicio in servicios %}
<div class="servicio-item">

    <label>
        <input type="checkbox"
        name="servicios"
        value="{{ servicio.id }}"

        {% if servicio.id|string in request.form.getlist('servicios') 
        or servicio.id|string in servicios_pre %}
        checked
        {% endif %}>
        
        {{ servicio.nombre }}
    </label>

</div>
{% endfor %}

<!-- MANICURISTA -->
<h6>Profesional</h6>

<select name="manicurista_id">
{% for manicurista in manicuristas %}
<option value="{{ manicurista.id }}"
{% if request.form.get('manicurista_id') == manicurista.id|string 
or manicurista_pre == manicurista.id|string %}
selected
{% endif %}
>
{{ manicurista.nombre }}
</option>
{% endfor %}
</select>

<!-- FECHA -->
<h6>Fecha</h6>

<input type="date"
name="fecha"
value="{{ request.form.get('fecha', fecha_pre) }}">

<!-- HORA -->
<h6>Hora</h6>

<select name="hora_inicio" id="hora_inicio"></select>

<!-- BOTÓN -->
<button type="submit" class="btn-reservar" id="btnReservar">
Reservar cita
</button>

<div class="loading" id="loadingText">
    Reservando...
</div>

</form>

</div>

<script>
function activarLoader() {
    document.getElementById("btnReservar").innerText = "Reservando...";
    document.getElementById("loadingText").style.display = "block";
}
</script>

{% endblock %}
